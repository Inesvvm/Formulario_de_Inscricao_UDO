<html lang="pt-pt">

    <body>
        <div class="main_Form">

            <div class="main_Form_Direita">
                <!--Inicio da classe dados pessoais-->
                    <div class="Dados_Pesoais">
                        <form>
                            <h1>Dados pessoais</h1> 
                            <!--Inicio da classe Nome_Data e Inputs correspondentes-->
                                <div class="Nome_Data">
                                    <h2>Nome</h2> 
                                    <h2 >Data de Nascimento</h2>
                                </div>   

                                    <!--Nome-->
                                    <input type="text" id="nome" oninput="this.value=this.value.replace(/[^a-zA-ZĂĄĂ Ă˘ĂŁĂŠĂ¨ĂŞĂ­ĂŻĂłĂ´ĂľĂśĂşĂ§ĂąĂĂĂĂĂĂĂĂĂĂĂĂĂĂĂ\s]/g, '');"  placeholder="Insira o seu Nome">
                                    <!--O placehoder serve para escrever dentro do Input o oniput serve para aceitar apaenas letras neste campo-->
                                    
                                    <!--Data-->
                                    <input type="text" id="data_Nascimento" inputmode="numeric" pattern="[0-9]{2}/[0-9]{2}/[0-9]{4}" maxlength="10" placeholder="Ex: dd/mm/aaaa">
                                    <!--O input mode serve para que no telĂŠmovel apareĂ§a somente nĂşmeros, o pattern ĂŠ forma que se vai escrever, o oninput sĂł deixa colocar nĂşmeros e o maxlength sĂł deixa colocar 10 numeros-->
                            <!--Inicio da classe Nome_Data e Inputs correspondentes-->
                            
                            
                            <!--Inicio da classe Contribuinte_Cartao e Inputs correspondentes-->
                                <div class="Contribuinte_Cartao">
                                    <h2>NÂş do Contribuinte/NIF</h2>
                                    <h2>BI/CC</h2>
                                </div>
                            
                                <!--Contribuinte-->
                                <input type="text" id="NIF" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1')" maxlength="9" placeholder="Ex: 123456789">
                                <!--O input mode serve para que no telĂŠmovel apareĂ§a somente nĂşmeros, o oninput sĂł deixa colocar nĂşmeros e o maxlength sĂł deixa colocar 9 numeros-->
                                
                                <!--BI_CC-->
                                <input type="text" id="BI_CC" pattern="[0-9]{8} [0-9]{1} [A-Z]{2}[0-9]{1}" maxlength="14" placeholder="Ex: 12345678 9 AB0">
                                <!--O pattern serve para seguir um formato expecĂ­fico sendo que o [0-9]/[A-Z] ĂŠ os digitos que sĂŁo permitidos e o {9}/{2}/{1} ĂŠ a quantidade desses valores que podem ser inseridos-->
                            <!--Fim da classe Contribuinte_Cartao e Inputs correspondentes-->

                            <!--Inicio da classe Morada_Localidade e Inputs correspondentes-->
                                <div class="Morada_Localidade">
                                    <h2>Morada</h2>
                                    <h2>Localidade</h2>
                                </div>

                                <!--Morada-->
                                <input type="text" id="morada" placeholder="Insira a sua Morada">
                                <!--Localidade-->
                                <input type="text" id="localidade" placeholder="Insira a sua Localidade">
                            <!--Fim da classe Morada_Localidade e Inputs correspondentes-->

                            <div class="Cod_Postal_e_Input">
                                <div class="Cod_Postal">
                                    <h2>CĂłdigo Postal</h2>
                                </div>
                                <input class="Input1" type="text" id="codigo_Postal" pattern="[0-9]{4}-[0-9]{3}" inputmode="numeric" maxlength="8" placeholder="Ex: XXXX-YYY">
                            </div>

                             <button id="Seguinte" class="StyleButao">PrĂłxima PĂĄgina</button>
                        </form>
                    </div>
                <!--Fim da classe dados pessoais-->

                                    <input type="email" id="Email" placeholder="Insira E-mail">

                            <!--Fim da subclasse Contacto_Mae-->

                                    <input type="email" id="Email_Urgente" placeholder="Insira o E-mail">
                                </div>
                            <!--Fim da subclasse Contacto_Urgente-->

                                <button class="Seguinte" id="Seguinte">PrĂłxima PĂĄgina</button>
                            </div>
                        </form>

                            <!--Fim da subclasse Pais_MĂŁe-->

                            <div class="butoes">
