                <div class="Dados_Pesoais">
                    <form>
                        <h1>Dados pessoais</h1>
                        <label>Nome</label>
                        <input type="text" id="Nome" oninput="this.value = this.value.replace(/[^a-zA-ZĂĄĂ ĂąĂŁĂ©ĂšĂȘĂ­ĂŻĂłĂŽĂ”Ă¶ĂșĂ§Ă±ĂĂĂĂĂĂĂĂĂĂĂĂĂĂĂ\s]/g, '');"  placeholder="Insira o seu Nome">
                        <!--O placehoder serve para escrever dentro do Input-->
                        
                        <label>Data de Nascimento</label>
                        <input type="date" id="Data_Nascimento">

                        <label>NÂș do Contribuinte/NIF</label>
                        <input type="text" id="NIF" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1')" maxlength="9" placeholder="Ex: 123456789">
                        <!--O input mode serve para que no telĂ©movel apareĂ§a somente nĂșmeros, o oninput sĂł deixa colocar nĂșmeros e o maxlength sĂł deixa colocar 9 numeros-->

                        <label>BI/CC</label>
                        <input type="text" id="BI_CC" pattern="[0-9]{8} [0-9]{1} [A-Z]{2}[0-9]{1}" maxlength="14" placeholder="Ex: 12345678 9 AB0">
                        <!--O pattern serve para seguir um formato expecĂ­fico sendo que o [0-9]/[A-Z] Ă© os digitos que sĂŁo permitidos e o {9}/{2}/{1} Ă© a quantidade desses valores que podem ser inseridos-->

                        <label>Morada</label>
                        <input type="text" id="Morada" placeholder="Insira a sua Morada">

                        <label>Localidade</label>
                        <input type="text" id="Localidade" placeholder="Insira a sua Localidade">
                        
                        <label>CĂłdigo Postal</label>
                        <input type="text" id="Cod_Postal" pattern="[0-9]{4}-[0-9]{3}" inputmode="numeric" maxlength="8" placeholder="Ex: XXXX-YYY">
                        
                        <button id="Seguinte" class="StyleButao">PrĂłxima Pagina</button>
                    </form>
