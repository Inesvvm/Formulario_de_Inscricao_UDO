<html lang="pt-pt">
    <head>
        <meta charset="UTF-8"><!--Serve para definir o caracteres que o navegador deve usar para exibir o texto da página-->
        <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
        <Title>Formulário UDO</Title>
        <link rel="stylesheet" href="style_Formulario.css">
    </head>

    <body>
        <div class="main_Form">
            <div class="main_Form_Esquerda">
                <img src="UDO_Basketball.jpg" alt="UDO_Basketball">
            </div>
            <div class="main_Form_Direita">
                <form name="Form_UDO">
                    <!--Inicio da classe dados pessoais-->
                        <div class="Dados_Pesoais Paginas" id="Pag_1"><!--Chama duas classes a Dados_Pesoais e Paginas-->
                            <h1>Dados pessoais</h1> 
                            <!--Inicio da classe Nome_Data-->
                                <div class="Nome_Data">
                                <!--Inicio da classe Nome-->
                                    <div class="Nome">
                                        <h2>Nome</h2> 
                                        <input type="text" id="nome" placeholder="Insira um Nome">
                                    </div>   
                                <!--Fim da classe Nome-->

                                <!--Inicio da classe Data-->
                                    <div class="Data">
                                        <h2>Data de Nascimento</h2>
                                        <input type="date" id="data_Nascimento">
                                    </div>
                                <!--Fim da classe Data-->
                                </div>
                            <!--Fim da classe Nome_Data-->    

                            <!--Inicio da classe Contribuinte_BI-->
                                <div class="Contribuinte_BI">
                                    <!--Inicio da classe Contribuinte-->
                                        <div class="Contribuinte">
                                            <h2>Nº do Contribuinte/NIF</h2>
                                            <input type="text" id="NIF" placeholder="Ex: 123456789">
                                        </div>
                                    <!--Fim da classe Contribuinte_Cartao-->
                                    <!--Inicio da classe Cartao-->
                                        <div class="Cartao_BI">
                                            <h2>BI/CC</h2>
                                            <input type="text" id="BI_CC" placeholder="Ex: 12345678 9 AB0">
                                        </div>
                                    <!--Fim da classe Cartao-->
                                </div>
                            <!--Fim da classe Contribuinte_BI-->
                            
                            <!--Inicio da classe Morada_Localidade-->
                                <div class="Morada_Localidade">
                                    <!--Inicio da classe Morada-->
                                        <div class="Morada">
                                            <h2>Morada</h2>
                                            <input type="text" id="morada" placeholder="Insira a sua Morada">
                                        </div>
                                    <!--Fim da classe Morada-->

                                    <!--Inicio da classe Localidade-->
                                        <div class="Localidade">
                                            <h2>Localidade</h2>
                                            <input type="text" id="localidade" placeholder="Insira a sua Localidade">
                                        </div>
                                    <!--Fim da classe Localidade-->
                                </div>

                            <!--Fim da classe Morada_Localidade-->
                            <!--Inicio da classe Cod_Postal_e_Input-->
                            
                            <!--Inicio da classe Cod_Postal-->
                                    <div class="Cod_Postal">
                                        <h2>Código Postal</h2>
                                        <input class="Input1" type="text" id="codigo_Postal" placeholder="Ex: XXXX-YYY">
                                    </div>
                            <!--Fim da classe Cod_Postal-->
                        </div>
                    <!--Fim da classe dados pessoais-->

                    <!--Inicio da classe Contactos-->
                        <div class="Contactos Paginas" id="Pag_2"><!--Chama duas classes a Contactos e Paginas-->
                            <h1>Contactos</h1>
                            <!--Início da subclasse Contacto_Próprio-->
                                <div class="Proprio">
                                    <h2>Próprio</h2>
                                    <!--Inicio da classe Proprio_Tel_Email-->
                                        <div class="Proprio_Tel_Email">
                                            <!--Inicio da classe Proprio_Tel-->
                                                <div class="Proprio_Tel">
                                                    <label>Telefone</label>
                                                    <input type="text" id="Tel" placeholder="Insira o Nº Telefone">
                                                </div>
                                            <!--Fim da classe Proprio_Tel-->

                                            <!--Inicio da classe Proprio_Email-->
                                                <div class="Proprio_Email">
                                                    <label>E-mail</label>
                                                    <input type="email" id="Email" placeholder="Insira E-mail">
                                                </div>
                                            <!--Fim da classe Proprio_Email-->
                                        </div>
                                    <!--Fim da classe Proprio_Tel_Email-->
                                </div>
                                
                            <!--Fim da subclasse Contacto_Próprio-->

                            <!--Início da subclasse Contacto_Pai-->
                                <div class="Contacto_Pai"> 
                                    <h2>Pai</h2>
                                    <!--Inicio da classe Pai_Tel_Email-->
                                        <div class="Pai_Tel_Email">
                                            <!--Inicio da classe Proprio_Tel-->
                                                <div class="Pai_Tel">
                                                    <label>Telefone</label>
                                                    <input type="text" id="Tel_Pai" placeholder="Insira o Nº Telefone">
                                                </div>
                                            <!--Fim da classe Proprio_Tel-->

                                            <!--Inicio da classe Proprio_Email-->
                                                <div class="Pai_Email">
                                                    <label>E-mail</label>
                                                    <input type="email" id="Email_Pai" placeholder="Insira o E-mail">
                                                </div>
                                            <!--Fim da classe Proprio_Email-->
                                        </div>
                                    <!--Fim da classe Pai_Tel_Email-->
                                </div>
                            <!--Fim da subclasse Contacto_Pai-->

                            <!--Início da subclasse Contacto_Mae-->
                                <div class="Contacto_Mae">
                                    <h2>Mãe</h2>
                                    <!--Inicio da classe Mae_Tel_Email-->
                                        <div class="Mae_Tel_Email">
                                            <!--Inicio da classe Mae_Tel-->
                                                <div class="Mae_Tel">
                                                    <label>Telefone</label>
                                                    <input type="text" id="Tel_Mae" placeholder="Insira o Nº Telefone">
                                                </div>
                                            <!--Fim da classe Mae_Tel-->

                                            <!--Inicio da classe Mae_Email-->
                                                <div class="Mae_Email">
                                                    <label>E-mail</label>
                                                    <input type="email" id="Email_Mae" placeholder="Insira o E-mail">
                                                </div>
                                            <!--Fim da classe Mae_Email-->
                                        </div>
                                    <!--Fim da classe Mae_Tel_Email-->
                                </div>
                            <!--Fim da subclasse Contacto_Mae-->

                            <!--Início da subclasse Contacto_Urgente-->
                                <div class="Contacto_Urgente">
                                    <h2>Urgente</h2>
                                    <!--Inicio da classe Urgente_Tel_Email-->
                                        <div class="Urgente_Tel_Email">
                                            <!--Inicio da classe Urgente_Tel-->
                                                <div class="Urgente_Tel">
                                                    <label>Telefone</label>
                                                    <input type="text" id="Tel_Urgente" placeholder="Insira o Nº Telefone">
                                                </div>
                                            <!--Fim da classe Urgente_Tel-->

                                            <!--Inicio da classe Urgente_Email-->
                                                <div class="Urgente_Email">
                                                    <label>E-mail</label>
                                                    <input type="email" id="Email_Urgente" placeholder="Insira o E-mail">
                                                </div>
                                            <!--Fim da classe Urgente_Email-->
                                        </div>
                                    <!--Fim da classe Urgente_Tel_Email-->
                                </div>
                            <!--Fim da subclasse Contacto_Urgente-->    
                    </div>
                    <!--Fim da classe Contactos-->

                    <!--Inicio da classe Pais-->
                        <div class="Pais Paginas" id="Pag_3"><!--Chama duas classes a Pais e Paginas-->
                            <h1>Pais</h1>
                            <!--Inicio da subclasse Pais_Pai-->
                                <div class="Pais_Pai">
                                    <h2>Pai</h2>
                                    <!--Inicio da Subclasse Pai_Nome_Idade-->
                                        <div class="Pai_Nome_Idade">
                                            <!--Inicio da Subclasse NomePai-->
                                                <div class="NomePai">
                                                    <label>Nome</label>
                                                    <input type="text" id="Nome_Pai"  placeholder="Insira o nome">
                                                </div>
                                            <!--Fim da Subclasse NomePai-->

                                            <!--Inicio da Subclasse IdadePai-->
                                                <div class="IdadePai">
                                                    <label>Idade</label>
                                                    <input type="text" id="Idade_Pai" placeholder="Insira a Idade">
                                                </div>
                                            <!--Fim da Subclasse IdadePai-->
                                        </div> 
                                    <!--Fim da Subclasse Pai_Nome_Idade-->
                                    
                                    <!--Inicio da Subclasse Pai_Profissao_Altura-->
                                        <div class="Pai_Profissao_Altura">
                                            <!--Inicio da Subclasse ProfissaoPai-->
                                                <div class="ProfissaoPai">
                                                    <label>Profissão</label>
                                                    <input type="text" id="Prof_Pai" placeholder="Insira a Profissão">
                                                </div>
                                            <!--Fim da Subclasse ProfissaoPai-->

                                            <!--Inicio da Subclasse AlturaPai-->
                                                <div class="AlturaPai">
                                                    <label>Altura</label>
                                                    <input type="text" id="Altura_Pai" placeholder="Ex: 1m 75cm">
                                                </div>
                                            <!--Fim da Subclasse AlturaPai-->
                                        </div>
                                     <!--Fim da Subclasse Pai_Profissao_Altura-->
                               </div>
                            <!--Fim da subclasse Pais_Pai-->

                            <!--Inicio da subclasse Pais_Mãe-->
                                <div class="Pais_Mae">
                                    <h2>Mãe</h2>
                                    <!--Inicio da Subclasse Mae_Nome_Idade-->
                                        <div class="Mae_Nome_Idade">
                                            <!--Inicio da Subclasse Mae_Nome-->
                                                <div class="Mae_Nome">
                                                    <label>Nome</label>
                                                    <input type="text" id="Nome_Mae"  placeholder="Insira o nome">
                                                </div>
                                            <!--Fim da Subclasse Mae_Nome-->

                                            <!--Inicio da Subclasse Mae_Idade-->
                                                <div class="Mae_Idade">
                                                    <label>Idade</label>
                                                    <input type="text" id="Idade_Mae" placeholder="Insira a Idade">
                                                </div>
                                            <!--Inicio da Subclasse Mae_Idade-->    
                                        </div>
                                    <!--Fim da Subclasse Mae_Nome_Idade-->

                                    <!--Inicio da Subclasse Mae_Profissao_Altura-->
                                        <div class="Mae_Profissao_Altura">
                                            <!--Inicio da Subclasse ProfissaoMae-->
                                                <div class="ProfissaoMae">
                                                    <label>Profissão</label>
                                                    <input type="text" id="Prof_Mae" placeholder="Insira a Profissão">
                                                </div>
                                            <!--Fim da Subclasse ProfissaoMae-->

                                            <!--Inicio da Subclasse MaeAltura-->
                                                <div class="MaeAltura">
                                                    <label>Altura</label>
                                                    <input type="text" id="Altura_Mae" placeholder="Ex: 1m 60cm">
                                                </div>
                                            <!--Fim da Subclasse MaeAltura-->
                                        </div>
                                    <!--Fim da Subclasse Mae_Profissao_Altura-->
                            </div>
                            <!--Fim da subclasse Pais_Mãe-->
                        </div>
                    <!--Fim da classe Pais-->

                    <!--Inicio da classe Observações-->
                        <div class="Observacao Paginas" id="Pag_4"> <!--Chama duas classes a Observacao e Paginas-->
                            <h1>Observações</h1>
                            <div class="Obs_Titulo">
                                <label>Exemplo: problemas de sáude</label>
                            </div>
                            <textarea id="Obs" placeholder="Insira aqui as Observações que deseja fazer"></textarea>

                            <!--Inicio da subclasse butoes-->
                                <div class="butao_Envia">
                                    <button class="Envia" type="submit" id="Enviar">Enviar</button>
                                </div>
                            <!--Inicio da subclasse butoes-->
                        </div>
                    <!--Fim da classe Observações-->

                    <!--Inicio da subclasse butoes-->
                                <div class="butoes">
                                    <button type="button" class="Anterior" onclick="Pag_Anterior()">Página Anterior</button>
                                    <button type="button" class="Seguinte"  onclick="Proxima_Pag()">Próxima Página</button>
                                </div>
                    <!--Inicio da subclasse butoes-->
                </form>
            </div>
        </div>
        <script src="app.js"></script>
    </body>
</html>
