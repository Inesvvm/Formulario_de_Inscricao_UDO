<html lang="pt-pt">
    <head>
        <meta charset="UTF-8"><!--Serve para definir o caracteres que o navegador deve usar para exibir o texto da página-->
        <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
        <Title>Formulário UDO</Title>
        <link rel="stylesheet" href="style_Formulario.css">
    </head>

    <body>
        <div class="main_Form">
            <div class="main_Form_Esquerda">
                <img src="UDO_Basketball.jpg" alt="UDO_Basketball">
            </div>
            <div class="main_Form_Direita">
                <!--Inicio da classe dados pessoais-->
                    <div class="Dados_Pesoais" id="Pag_1">
                        <form>
                            <h1>Dados pessoais</h1> 
                            <!--Inicio da classe Nome_Data e Inputs correspondentes-->
                                <div class="Nome_Data">
                                    <h2>Nome</h2> 
                                    <h2 >Data de Nascimento</h2>
                                </div>   

                                    <!--Nome-->
                                    <input type="text" id="nome" oninput="this.value=this.value.replace(/[^a-zA-ZáàâãéèêíïóôõöúçñÁÀÂÃÉÈÍÏÓÔÕÖÚÇÑ\s]/g, '');"  required  maxlength="150" placeholder="Insira um Nome">
                                    <!--O placehoder serve para escrever dentro do Input o oniput serve para aceitar apaenas letras neste campo-->
                                    
                                    <!--Data-->
                                    <input type="text" id="data_Nascimento" inputmode="numeric" pattern="[0-9]{2}-[0-9]{2}-[0-9]{4}" maxlength="10" placeholder="Ex: dd/mm/aaaa">
                                    <!--O input mode serve para que no telémovel apareça somente números, o pattern é forma que se vai escrever, o oninput só deixa colocar números e o maxlength só deixa colocar 10 numeros-->
                            <!--Fim da classe Nome_Data e Inputs correspondentes-->
                            
                            
                            <!--Inicio da classe Contribuinte_Cartao e Inputs correspondentes-->
                                <div class="Contribuinte_Cartao">
                                    <h2>Nº do Contribuinte/NIF</h2>
                                    <h2>BI/CC</h2>
                                </div>
                            
                                <!--Contribuinte-->
                                <input type="text" id="NIF" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1')" maxlength="9" placeholder="Ex: 123456789">
                                <!--O input mode serve para que no telémovel apareça somente números, o oninput só deixa colocar números e o maxlength só deixa colocar 9 numeros-->
                                
                                <!--BI_CC-->
                                <input type="text" id="BI_CC" pattern="[0-9]{8} [0-9]{1} [A-Z]{2}[0-9]{1}" maxlength="14" placeholder="Ex: 12345678 9 AB0">
                                <!--O pattern serve para seguir um formato expecífico sendo que o [0-9]/[A-Z] é os digitos que são permitidos e o {9}/{2}/{1} é a quantidade desses valores que podem ser inseridos-->
                            <!--Fim da classe Contribuinte_Cartao e Inputs correspondentes-->

                            <!--Inicio da classe Morada_Localidade e Inputs correspondentes-->
                                <div class="Morada_Localidade">
                                    <h2>Morada</h2>
                                    <h2>Localidade</h2>
                                </div>

                                <!--Morada-->
                                <input type="text" id="morada" placeholder="Insira a sua Morada">
                                <!--Localidade-->
                                <input type="text" id="localidade" placeholder="Insira a sua Localidade">
                            <!--Fim da classe Morada_Localidade e Inputs correspondentes-->

                            <!--Inicio da classe Cod_Postal_e_Input-->
                                <div class="Cod_Postal_e_Input">
                                    <div class="Cod_Postal">
                                        <h2>Código Postal</h2>
                                    </div>
                                    <input class="Input1" type="text" id="codigo_Postal" pattern="[0-9]{4}-[0-9]{3}" inputmode="numeric" maxlength="8" placeholder="Ex: XXXX-YYY">
                                </div>
                            <!--Fim da classe Cod_Postal_e_Input-->

                             <button type="button" id="Seguinte" class="StyleButao" onclick="Verifica1();Proxima_Pag() ">Próxima Página</button><!--Chama as funções Proxima paginah e Verifica1 e o type buton evita que a página renicie-->
                        </form>
                    </div>
                <!--Fim da classe dados pessoais-->

                <!--Inicio da classe Contactos-->
                    <div class="Contactos" id="Pag_2">
                        <form>
                            <h1>Contactos</h1>
                            <!--Início da subclasse Contacto_Próprio-->
                                <div class="Proprio">
                                    <h2>Próprio</h2>
                                    <div class="Proprio_Tel_Email">
                                        <label>Telefone</label>
                                        <label>E-mail</label>
                                    </div>
                                     <!--Tel-->
                                    <input type="text" id="Tel" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1')" maxlength="9" placeholder="Insira o Nº Telefone">
                                     <!--email-->
                                    <input type="email" id="Email" placeholder="Insira E-mail">
                                </div>
                            <!--Fim da subclasse Contacto_Próprio-->

                            <!--Início da subclasse Contacto_Pai-->
                                <div class="Contacto_Pai"> 
                                    <h2>Pai</h2>
                                    <div class="Pai_Tel_Email">
                                        <label>Telefone</label>
                                        <label>E-mail</label>
                                    </div>
                                   
                                    <!--Tel-->
                                    <input type="text" id="Tel_Pai" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1')" maxlength="9" placeholder="Insira o Nº Telefone">
                                    <!--Email-->
                                    <input type="email" id="Email_Pai" placeholder="Insira o E-mail">
                                </div>
                            <!--Fim da subclasse Contacto_Pai-->

                            <!--Início da subclasse Contacto_Mae-->
                                <div class="Contacto_Mae">
                                    <h2>Mãe</h2>
                                    <div class="Mae_Tel_Email">
                                        <label>Telefone</label>
                                        <label>E-mail</label>
                                    </div>
                                    <!--Tel-->
                                    <input type="text" id="Tel_Mãe" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1')" maxlength="9" placeholder="Insira o Nº Telefone">
                                    <!--email-->
                                    <input type="email" id="Email_Mãe" placeholder="Insira o E-mail">
                                </div>
                            <!--Fim da subclasse Contacto_Mae-->


                            <!--Início da subclasse Contacto_Urgente-->
                                <div class="Contacto_Urgente">
                                    <h2>Urgente</h2>
                                    <div class="Urgente">
                                        <label>Telefone</label>
                                        <label>E-mail</label>
                                    </div>

                                    <!--Tel-->
                                    <input type="text" id="Urgente" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1')" maxlength="9" placeholder="Insira o Nº Telefone">
                                    <!--email-->
                                    <input type="email" id="Email_Urgente" placeholder="Insira o E-mail">
                                </div>
                            <!--Fim da subclasse Contacto_Urgente-->

                            <!--Inicio da subclasse butoes-->
                                <div class="butoes">
                                    <button type="button" class="Anterior" id="Anterior" onclick="Pag_Anterior()">Página Anterior</button>
                                    <button type="button" class="Seguinte" id="Seguinte" onclick="Proxima_Pag()">Próxima Página</button>
                                </div>
                            <!--Inicio da subclasse butoes-->
                        </form>
                    </div>
                <!--Fim da classe Contactos-->

                <!--Inicio da classe Pais-->
                    <div class="Pais" id="Pag_3">
                        <form>
                            <h1>Pais</h1>
                            <!--Inicio da subclasse Pais_Pai-->
                                <div class="Pais_Pai">
                                    <h2>Pai</h2>
                                    <!--Inicio da Subclasse Pai_cima para ficarem na parte superior -->
                                        <div class="Pai_cima">
                                            <label>Nome</label>
                                            <label>Idade</label>
                                        </div>
                                        
                                        
                                        <input type="text" id="Nome_Pai" oninput="this.value = this.value.replace(/[^a-zA-ZáàâãéèêíïóôõöúçñÁÀÂÃÉÈÍÏÓÔÕÖÚÇÑ\s]/g, '');" placeholder="Insira o nome">
                                        <input type="text" id="Idade_Pai" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g, '').replace(/(\..*?)\..*/g, '$1')" maxlength="3" placeholder="Insira a Idade">
                                        
                                    <!--Fim das Subclasses Pai_cima para ficarem na parte superior -->
                                    
                                    <!--Inicio das Subclasse Pai_Baixo para ficarem na parte inferior -->
                                        <div class="Pai_Baixo">
                                            <label>Profissão</label>
                                            <label>Altura</label>
                                        </div>
                                        
                                        
                                        <input type="text" id="Prof_Pai" oninput="this.value = this.value.replace(/[^a-zA-ZáàâãéèêíïóôõöúçñÁÀÂÃÉÈÍÏÓÔÕÖÚÇÑ\s]/g, '');" placeholder="Insira a Profissão">
                                        <input type="text" id="Altura_Pai" pattern="[0-9]{1}m [0-9]{2}cm" maxlength="7" placeholder="Ex: 1m 75cm">
                                    <!--Fim das Subclasses Pai_Baixo para ficarem na parte inferior -->
                                </div>
                            <!--Fim da subclasse Pais_Pai-->

                            <!--Inicio da subclasse Pais_Mãe-->
                                <div class="Pais_Mãe">
                                    <h2>Mãe</h2>
                                    <!--Inicio da Subclasse Mae_cima para ficarem na parte superior -->
                                        <div class="Mae_cima">
                                            <label>Nome</label>
                                            <label>Idade</label>
                                        </div>
                                        
                                        <input type="text" id="Nome_Mãe" oninput="this.value = this.value.replace(/[^a-zA-ZáàâãéèêíïóôõöúçñÁÀÂÃÉÈÍÏÓÔÕÖÚÇÑ\s]/g, '');" placeholder="Insira o nome">
                                        <input type="text" id="Idade_Mãe" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g, '').replace(/(\..*?)\..*/g, '$1')" maxlength="3" placeholder="Insira a Idade">
                                    <!--Fim da Subclasse Mae_cima para ficarem na parte superior -->    

                                    <!--Inicio da Subclasse Mae_Baixo para ficarem na parte inferior -->
                                        <div class="Mae_Baixo">
                                            <label>Profissão</label>
                                            <label>Altura</label>
                                        </div>
                                    
                                        <input type="text" id="Prof_Mãe" oninput="this.value = this.value.replace(/[^a-zA-ZáàâãéèêíïóôõöúçñÁÀÂÃÉÈÍÏÓÔÕÖÚÇÑ\s]/g, '');" placeholder="Insira a Profissão">
                                        <input type="text" id="Altura_Mãe" pattern="[0-9]{1}m [0-9]{2}cm" maxlength="7" placeholder="Ex: 1m 60cm">
                                    <!--Fim da Subclasse Mae_Baixo para ficarem na parte inferior -->
                                
                                </div>
                            <!--Fim da subclasse Pais_Mãe-->

                            <!--Inicio da subclasse butoes-->
                                <div class="butoes">
                                    <button type="button" class="Anterior" id="Anterior"  onclick="Pag_Anterior()">Página Anterior</button>
                                    <button type="button" class="Seguinte" id="Seguinte" onclick="Proxima_Pag()">Próxima Página</button>
                                </div>
                            <!--Fim da subclasse butoes-->
                        </form>
                    </div>
                <!--Fim da classe Pais-->

                <!--Inicio da classe Observações-->
                    <div class="Observacao" id="Pag_4">
                        <h1>Observações</h1>
                        <div class="Obs_Titulo">
                            <label>Exemplo: problemas de sáude</label>
                        </div>
                        <textarea id="Obs" placeholder="Insira aqui as Observações que deseja fazer"></textarea>

                        <!--Inicio da subclasse butoes-->
                            <div class="butoes">
                                <button type="button" class="Anterior" id="Anterior"  onclick="Pag_Anterior()">Página Anterior</button>
                                <button class="Envia" type="submit" id="Enviar">Enviar</button>
                            </div>
                        <!--Inicio da subclasse butoes-->
                    </div>
                <!--Fim da classe Observações-->
            </div>
        </div>
        <script src="app.js"></script>
    </body>
</html>
